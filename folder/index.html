<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FLOWHUNT — Live Trending</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  /* ── reset & tokens ────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #07080a;
    --bg2:        #0d0f12;
    --bg3:        #13161b;
    --surface:    #181b22;
    --border:     #23272f;
    --border2:    #2d323d;
    --txt:        #e8eaf0;
    --txt2:       #8890a0;
    --txt3:       #555e6e;
    --accent:     #6affa3;       /* neon green */
    --accent2:    #ff6a6a;       /* neon red */
    --accent3:    #6aaeff;       /* neon blue */
    --yt:         #ff4444;
    --shorts:     #1a1a1a;
    --tiktok:     #ee1d52;
    --reddit:     #ff5700;
    --twitter:    #1da1f2;
    --glow:       0 0 24px rgba(106,255,163,0.18);
    --card-r:     14px;
    --transition: 0.2s cubic-bezier(.4,0,.2,1);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--txt);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── noise overlay ─────────────────────────────────────────────── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.35;
  }

  /* ── grid bg lines ─────────────────────────────────────────────── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(106,255,163,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(106,255,163,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── header ────────────────────────────────────────────────────── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(7,8,10,0.85);
    backdrop-filter: blur(20px) saturate(1.8);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }

  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    height: 64px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }

  .logo-icon {
    width: 30px;
    height: 30px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .logo span { color: var(--accent); }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    background: rgba(106,255,163,0.08);
    border: 1px solid rgba(106,255,163,0.2);
    border-radius: 20px;
    padding: 3px 8px;
    letter-spacing: 0.5px;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.8); }
  }

  .search-wrap {
    flex: 1;
    max-width: 380px;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--txt3);
    pointer-events: none;
  }

  #search {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px 8px 36px;
    color: var(--txt);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border var(--transition), box-shadow var(--transition);
  }

  #search::placeholder { color: var(--txt3); }
  #search:focus {
    border-color: rgba(106,255,163,0.4);
    box-shadow: 0 0 0 3px rgba(106,255,163,0.07);
  }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #last-updated {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--txt3);
    white-space: nowrap;
  }

  #refresh-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 9px;
    color: var(--txt);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    padding: 7px 14px;
    cursor: pointer;
    transition: all var(--transition);
    white-space: nowrap;
  }

  #refresh-btn:hover {
    background: var(--bg3);
    border-color: var(--accent);
    color: var(--accent);
  }

  #refresh-btn svg { transition: transform 0.5s; }
  #refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── sub-header / filters ──────────────────────────────────────── */
  .sub-header {
    background: rgba(7,8,10,0.7);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    position: sticky;
    top: 64px;
    z-index: 90;
  }

  .sub-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 8px;
    height: 52px;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .sub-inner::-webkit-scrollbar { display: none; }

  .filter-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--txt2);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    padding: 6px 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: all var(--transition);
  }

  .filter-btn:hover {
    background: var(--surface);
    color: var(--txt);
    border-color: var(--border2);
  }

  .filter-btn.active {
    border-color: currentColor;
    color: var(--txt);
    font-weight: 600;
  }

  .filter-btn[data-filter="all"].active      { color: var(--accent); background: rgba(106,255,163,0.06); border-color: rgba(106,255,163,0.35); }
  .filter-btn[data-filter="youtube"].active  { color: var(--yt);     background: rgba(255,68,68,0.07);   border-color: rgba(255,68,68,0.35); }
  .filter-btn[data-filter="youtube_shorts"].active { color: #c8c8c8; background: rgba(200,200,200,0.07); border-color: rgba(200,200,200,0.35); }
  .filter-btn[data-filter="tiktok"].active   { color: var(--tiktok); background: rgba(238,29,82,0.07);   border-color: rgba(238,29,82,0.35); }
  .filter-btn[data-filter="reddit"].active   { color: var(--reddit); background: rgba(255,87,0,0.07);    border-color: rgba(255,87,0,0.35); }
  .filter-btn[data-filter="twitter"].active  { color: var(--twitter);background: rgba(29,161,242,0.07);  border-color: rgba(29,161,242,0.35); }

  .filter-count {
    background: var(--bg3);
    border-radius: 5px;
    padding: 1px 6px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--txt3);
  }

  .filter-sep {
    width: 1px;
    height: 20px;
    background: var(--border);
    flex-shrink: 0;
    margin: 0 2px;
  }

  /* ── stats bar ─────────────────────────────────────────────────── */
  .stats-bar {
    max-width: 1400px;
    margin: 0 auto;
    padding: 14px 24px 0;
    display: flex;
    align-items: center;
    gap: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--txt3);
  }

  .stat-item { display: flex; align-items: center; gap: 6px; }
  .stat-dot  { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  /* ── main grid ─────────────────────────────────────────────────── */
  main {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px 24px 60px;
  }

  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  /* ── card ──────────────────────────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-r);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
    animation: fadeUp 0.35s ease both;
    position: relative;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card:hover {
    transform: translateY(-3px);
    border-color: var(--border2);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  }

  .card[data-platform="youtube"]:hover     { border-color: rgba(255,68,68,0.35); }
  .card[data-platform="youtube_shorts"]:hover { border-color: rgba(200,200,200,0.3); }
  .card[data-platform="tiktok"]:hover      { border-color: rgba(238,29,82,0.35); }
  .card[data-platform="reddit"]:hover      { border-color: rgba(255,87,0,0.35); }
  .card[data-platform="twitter"]:hover     { border-color: rgba(29,161,242,0.35); }

  /* thumb */
  .card-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    background: var(--bg3);
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
  }

  .card[data-platform="youtube_shorts"] .card-thumb {
    aspect-ratio: 9/16;
    max-height: 200px;
    aspect-ratio: unset;
    height: 180px;
  }

  .card-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease;
  }

  .card:hover .card-thumb img { transform: scale(1.04); }

  .card-thumb .no-thumb {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    background: linear-gradient(135deg, var(--bg2), var(--bg3));
  }

  /* platform badge */
  .platform-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    display: flex;
    align-items: center;
    gap: 4px;
    border-radius: 6px;
    padding: 3px 8px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.3px;
    z-index: 2;
    backdrop-filter: blur(8px);
  }

  .platform-badge.youtube     { background: rgba(255,68,68,0.85);  color: #fff; }
  .platform-badge.youtube_shorts { background: rgba(15,15,15,0.9); color: #eee; border: 1px solid rgba(255,255,255,0.15); }
  .platform-badge.tiktok      { background: rgba(238,29,82,0.85);  color: #fff; }
  .platform-badge.reddit      { background: rgba(255,87,0,0.85);   color: #fff; }
  .platform-badge.twitter     { background: rgba(29,161,242,0.85); color: #fff; }

  /* heat bar */
  .heat-bar-wrap {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: rgba(0,0,0,0.4);
  }

  .heat-bar {
    height: 100%;
    transition: width 0.6s ease;
  }

  .heat-bar.youtube     { background: linear-gradient(90deg, #ff4444, #ff8888); }
  .heat-bar.youtube_shorts { background: linear-gradient(90deg, #888, #ccc); }
  .heat-bar.tiktok      { background: linear-gradient(90deg, #ee1d52, #ff6ead); }
  .heat-bar.reddit      { background: linear-gradient(90deg, #ff5700, #ff9466); }
  .heat-bar.twitter     { background: linear-gradient(90deg, #1da1f2, #7ec8fb); }

  /* card body */
  .card-body {
    padding: 14px 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
  }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 14px;
    line-height: 1.45;
    color: var(--txt);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-top: auto;
  }

  .card-author {
    font-size: 12px;
    color: var(--txt2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 160px;
  }

  .card-score {
    display: flex;
    align-items: center;
    gap: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    flex-shrink: 0;
  }

  .score-flame { font-size: 12px; }

  .card-score.hot   { color: #ff9446; }
  .card-score.warm  { color: #ffcc44; }
  .card-score.cold  { color: var(--txt3); }

  /* shorts indicator */
  .shorts-tag {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 11px;
    color: #aaa;
    font-family: 'DM Mono', monospace;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    padding: 2px 6px;
  }

  /* ── loading / error / empty states ────────────────────────────── */
  #state-overlay {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 340px;
    gap: 16px;
    color: var(--txt3);
    font-size: 14px;
  }

  #state-overlay.visible { display: flex; }

  .spinner {
    width: 40px;
    height: 40px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .state-icon { font-size: 48px; }
  .state-msg  { color: var(--txt2); font-weight: 500; }
  .state-sub  { color: var(--txt3); font-size: 13px; text-align: center; max-width: 340px; }

  /* ── toast ─────────────────────────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 13px;
    color: var(--txt);
    z-index: 999;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s ease;
    max-width: 280px;
  }

  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { border-color: rgba(106,255,163,0.4); }
  #toast.error   { border-color: rgba(255,106,106,0.4); }

  /* ── responsive ─────────────────────────────────────────────────── */
  @media (max-width: 768px) {
    .header-inner { gap: 12px; }
    .search-wrap  { max-width: 200px; }
    #last-updated { display: none; }
    main          { padding: 16px 12px 40px; }
    #grid         { grid-template-columns: 1fr 1fr; gap: 10px; }
  }

  @media (max-width: 500px) {
    #grid { grid-template-columns: 1fr; }
    .header-inner { gap: 8px; }
    .logo-text    { display: none; }
  }
</style>
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────────────────── -->
<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <span class="logo-text">FLOW<span>HUNT</span></span>
    </div>
    <div class="live-badge">
      <div class="live-dot"></div>
      LIVE
    </div>
    <div class="search-wrap">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search" type="text" placeholder="Search trending…" autocomplete="off" />
    </div>
    <div class="header-right">
      <span id="last-updated">—</span>
      <button id="refresh-btn">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Refresh
      </button>
    </div>
  </div>
</header>

<!-- ── FILTER BAR ───────────────────────────────────────────────── -->
<div class="sub-header">
  <div class="sub-inner">
    <button class="filter-btn active" data-filter="all">
      ✦ All <span class="filter-count" id="cnt-all">0</span>

      YouTube <span class="filter-count" id="cnt-youtube">0</span>
    </button>
    <button class="filter-btn" data-filter="youtube_shorts">
      📱 Shorts <span class="filter-count" id="cnt-youtube_shorts">0</span>
    </button>
    <button class="filter-btn" data-filter="tiktok">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/></svg>
      TikTok <span class="filter-count" id="cnt-tiktok">0</span>
    </button>
    <button class="filter-btn" data-filter="reddit">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.687-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>
      Reddit <span class="filter-count" id="cnt-reddit">0</span>
